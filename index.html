<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Happy Birthday Laiba</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600;700;800;900&family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="particle-container" id="particleContainer"></div>
    
    <div class="app-wrapper">
        <!-- Countdown Section -->
        <div id="countdownSection" class="countdown-section active">
            <div class="countdown-container">
                <div class="countdown-ring"></div>
                <div class="countdown-content">
                    <h1 class="countdown-title">A Special Surprise Awaits</h1>
                    <div class="countdown-subtitle">For a Wonderful Soul</div>
                    <div class="timer-wrapper">
                        <div class="timer-block">
                            <div class="timer-number" id="days">00</div>
                            <div class="timer-label">Days</div>
                        </div>
                        <div class="timer-separator">:</div>
                        <div class="timer-block">
                            <div class="timer-number" id="hours">00</div>
                            <div class="timer-label">Hours</div>
                        </div>
                        <div class="timer-separator">:</div>
                        <div class="timer-block">
                            <div class="timer-number" id="minutes">00</div>
                            <div class="timer-label">Minutes</div>
                        </div>
                        <div class="timer-separator">:</div>
                        <div class="timer-block">
                            <div class="timer-number" id="seconds">00</div>
                            <div class="timer-label">Seconds</div>
                        </div>
                    </div>
                    <div class="countdown-message">Until the magic begins...</div>
                </div>
            </div>
        </div>

        <!-- Quiz Section -->
        <div id="quizSection" class="quiz-section">
            <div class="quiz-container">
                <div class="quiz-header">
                    <div class="quiz-decoration"></div>
                    <h2 class="quiz-title">A Little Challenge</h2>
                    <p class="quiz-subtitle">Answer these questions to reveal the message</p>
                </div>
                <div class="quiz-card">
                    <div class="question-counter" id="questionCounter">Question 1 of 3</div>
                    <div class="question-text" id="questionText"></div>
                    <div class="options-container" id="optionsContainer"></div>
                    <div class="feedback-message" id="feedbackMessage"></div>
                </div>
            </div>
        </div>

        <!-- Message Section -->
        <div id="messageSection" class="message-section">
            <div class="message-container">
                <div class="message-card-glow">
                    <div class="message-header">
                        <div class="decoration-line"></div>
                        <h2 class="message-title">A Letter For You</h2>
                        <div class="decoration-line"></div>
                    </div>
                    <div class="message-scroll-container">
                        <div class="message-content" id="finalMessageContent"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
